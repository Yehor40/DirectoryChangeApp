<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change detector</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<main class="container">
    <header class="app-header">
        <h1>Catalog change detector</h1>
    </header>

    <section class="analyzer-box">
        <div class="input-group">
            <input type="text" id="directoryPath" placeholder="Zadejte absolutní cestu (např. C:\Data\Projekty)">
            <button id="btnAnalyze" class="btn-primary">Analyze catalog</button>
        </div>
        <div id="errorMessage" class="alert alert-danger hidden"></div>
    </section>

    <div id="loader" class="loader hidden">
        <div class="spinner"></div>
        <p>Hashing and analysis...</p>
    </div>

    <section id="resultsSection" class="results-container hidden">
        <h2>Analysis results:</h2>

        <div class="report-card card-added">
            <h3>New items: (<span id="countAdded">0</span>)</h3>
            <ul id="listAdded" class="report-list"></ul>
        </div>

        <div class="report-card card-modified">
            <h3>Modified files: (<span id="countModified">0</span>)</h3>
            <ul id="listModified" class="report-list"></ul>
        </div>

        <div class="report-card card-deleted">
            <h3>Removed items: (<span id="countDeleted">0</span>)</h3>
            <ul id="listDeleted" class="report-list"></ul>
        </div>
    </section>
</main>

<script src="js/app.js"></script>
</body>
</html>
