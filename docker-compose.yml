services:
  directory-change-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: directory-change-app:latest
    ports:
      - "8080:8080"
    volumes:
      - type: bind
        source: ./data
        target: /app/data
      - type: bind
        source: ${HOST_FILES_ROOT:-.}
        target: /host-files
        read_only: true
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      PathMapping__HostPathPrefix: ${HOST_FILES_ROOT:-}
      PathMapping__ContainerPathPrefix: /host-files
